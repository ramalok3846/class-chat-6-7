<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6-7반 톡톡 v6.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --p-main: #6a1b9a; --p-dark: #4a148c; --p-mid: #9c27b0; --p-light: #f3e5f5; 
            --white: #ffffff; --gray: #f0f0f5; --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --danger: #ff5252; --membership: #ffd700;
        }
        /* 노란색 테마 오버라이드 */
        .theme-yellow {
            --p-main: #fee500; --p-dark: #3c1e1e; --p-mid: #fada0a; --p-light: #fff9c4;
            --white: #ffffff; --gray: #f2f2f2;
        }
        
        * { box-sizing: border-box; transition: all 0.2s ease; font-family: 'Pretendard', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--gray); overflow: hidden; position: fixed; }

        /* 글로벌 시계 */
        .global-clock {
            position: fixed; top: 15px; font-size: 13px; font-weight: 800; color: var(--p-main); z-index: 1000;
            background: rgba(255,255,255,0.92); padding: 8px 18px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            backdrop-filter: blur(10px); border: 1px solid var(--p-light);
        }
        .clock-left { left: 20px; }
        .clock-center { left: 50%; transform: translateX(-50%); }

        /* 로딩 레이어 */
        #loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: var(--white);
            z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--p-light); border-top: 4px solid var(--p-main); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .section { display: none; height: 100%; width: 100%; flex-direction: column; justify-content: center; align-items: center; padding: 20px; opacity: 0; }
        .active { display: flex !important; opacity: 1; }

        .card { 
            background: var(--white); padding: 30px; border-radius: 35px; box-shadow: var(--shadow); 
            width: 100%; max-width: 420px; text-align: center; border: 1px solid rgba(255,255,255,0.8);
            max-height: 85vh; overflow-y: auto;
        }

        /* 아바타 */
        .avatar-circle {
            width: 80px; height: 80px; border-radius: 30px; background: #eee; margin: 0 auto 15px;
            display: flex; justify-content: center; align-items: center; border: 3px solid var(--white);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); overflow: hidden; position: relative;
        }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        .membership-badge { position: absolute; bottom: -2px; right: -2px; font-size: 18px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }

        /* 입력 폼 */
        .input-group { text-align: left; margin-bottom: 15px; width: 100%; }
        .select-label { font-size: 12px; color: var(--p-main); font-weight: 800; margin-bottom: 6px; display: block; padding-left: 5px; }
        .custom-input, .select-box {
            width: 100%; padding: 14px; border-radius: 18px; border: 2px solid var(--p-light);
            font-size: 15px; outline: none; background: #fafafa; cursor: pointer;
        }

        /* 친구 목록 스타일 */
        .friend-list { width: 100%; text-align: left; margin-top: 10px; }
        .friend-item {
            display: flex; align-items: center; padding: 12px; border-radius: 15px; cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
        }
        .friend-item:hover { background: var(--p-light); }
        .friend-info { flex: 1; }
        .friend-name { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 4px; }
        .friend-status { font-size: 12px; color: #888; }

        /* 채팅 레이아웃 */
        #chat-section { padding: 0; justify-content: flex-start; }
        .chat-header {
            width: 100%; background: var(--p-main); color: var(--theme-text, white); padding: 15px 20px; display: flex; 
            justify-content: space-between; align-items: center; z-index: 10; padding-top: env(safe-area-inset-top, 15px);
        }
        #chat-display { flex: 1; width: 100%; max-width: 800px; overflow-y: auto; padding: 10px 0; display: flex; flex-direction: column; }
        .date-divider { display: flex; align-items: center; justify-content: center; margin: 20px 0; color: #888; font-size: 11px; font-weight: 700; }
        .date-divider::before, .date-divider::after { content: ""; flex: 1; height: 1px; background: #ddd; margin: 0 15px; }

        .msg-row { display: flex; max-width: 88%; align-items: flex-end; margin-bottom: 20px; padding: 0 15px; }
        .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { 
            padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5;
            background: white; box-shadow: 0 2px 6px rgba(0,0,0,0.05); position: relative; word-break: break-all;
        }
        .me .bubble { background: var(--p-main); color: var(--theme-text, white); border-bottom-right-radius: 4px; }
        .other .bubble { border-bottom-left-radius: 4px; }
        
        .delete-trigger-btn {
            opacity: 0; pointer-events: none; background: rgba(255, 82, 82, 0.1); color: var(--danger); 
            border: none; padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: 800; margin-top: 4px;
        }
        .msg-row.me:hover .delete-trigger-btn { opacity: 1; pointer-events: auto; }

        .input-wrap { width: 100%; background: white; padding: 10px 15px 25px; border-top: 1px solid #eee; }
        .main-input-row { display: flex; gap: 8px; align-items: center; max-width: 800px; margin: 0 auto; }
        #msgInput { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1.5px solid #eee; background: #f9f9fb; font-size: 15px; outline: none; }
        
        /* 공통 버튼 */
        .action-btn { padding: 15px; border-radius: 20px; border: none; background: var(--p-main); color: var(--theme-text, #fff); font-weight: 800; cursor: pointer; width: 100%; }
        .sub-btn { padding: 12px; border-radius: 15px; border: none; background: #f0f0f5; color: #555; font-weight: 700; cursor: pointer; }
        
        /* 모달 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 5000; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #fff; border-radius: 30px; padding: 25px; width: 90%; max-width: 380px; max-height: 80vh; overflow-y: auto; }

        /* 테마 스위치 */
        .theme-selector { display: flex; gap: 10px; margin-top: 10px; }
        .theme-btn { flex: 1; padding: 10px; border-radius: 12px; border: 2px solid #eee; font-weight: 700; cursor: pointer; }
        .theme-btn.active { border-color: var(--p-main); background: var(--p-light); }

        /* 홈 탭 스위치 */
        .home-tabs { display: flex; border-bottom: 1px solid #eee; margin-bottom: 15px; }
        .tab-item { flex: 1; padding: 12px; font-weight: 800; color: #aaa; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-item.active { color: var(--p-main); border-bottom: 2px solid var(--p-main); }
    </style>
</head>
<body class="theme-purple">

    <div id="loading-overlay"><div class="spinner"></div><p id="loading-msg">처리 중...</p></div>
    <div id="clock-display" class="global-clock clock-left"></div>

    <!-- 1. 로그인 섹션 -->
    <div id="login-section" class="section active">
        <div class="card">
            <h2 style="color:var(--p-main); margin-bottom:20px;">6-7반 톡톡 v6.0 🔒</h2>
            <div class="input-group">
                <span class="select-label">이름</span>
                <div class="select-box" onclick="openNameModal('login')"><span id="login-name-text">목록에서 선택</span></div>
            </div>
            <div class="input-group">
                <span class="select-label">비밀번호</span>
                <input type="password" id="loginPw" class="custom-input" placeholder="비밀번호 입력" onkeypress="if(event.keyCode==13) handleLogin()">
            </div>
            <button class="action-btn" onclick="handleLogin()">로그인</button>
        </div>
    </div>

    <!-- 2. 관리자 섹션 -->
    <div id="admin-section" class="section">
        <div class="card">
            <h3 style="color:var(--p-main);">멤버십 관리 도구 🛠️</h3>
            <p style="font-size:12px; color:#666; margin-bottom:20px;">학생들의 퍼플톡 패스 권한을 설정합니다.</p>
            <div id="admin-student-list" style="text-align:left;"></div>
            <button class="sub-btn" style="width:100%; margin-top:15px;" onclick="startLogout()">로그아웃</button>
        </div>
    </div>

    <!-- 3. 메인 홈 섹션 (친구목록 / 채팅시작) -->
    <div id="select-section" class="section">
        <div class="card">
            <div class="home-tabs">
                <div id="tab-friends" class="tab-item active" onclick="setHomeTab('friends')">친구</div>
                <div id="tab-start" class="tab-item" onclick="setHomeTab('start')">채팅 시작</div>
            </div>

            <!-- 친구 목록 탭 -->
            <div id="view-friends">
                <div class="friend-item" style="cursor:default; background:#f9f9fb; margin-bottom:10px;">
                    <div class="avatar-circle" style="width:50px; height:50px; border-radius:18px; margin:0 12px 0 0;">
                        <img id="my-profile-img" src="">
                        <span id="my-membership-badge" class="membership-badge"></span>
                    </div>
                    <div class="friend-info">
                        <div class="friend-name" id="my-name-display">나</div>
                        <div class="friend-status">상태 메시지를 설정해보세요.</div>
                    </div>
                </div>
                <div style="font-size:11px; color:#888; margin:15px 0 8px 5px;">친구 <span id="friend-count">0</span></div>
                <div id="main-friend-list" class="friend-list"></div>
            </div>

            <!-- 수동 입장 탭 -->
            <div id="view-start" style="display:none;">
                <div class="input-group">
                    <span class="select-label">대화 상대 선택</span>
                    <div class="select-box" onclick="openNameModal('target')"><span id="target-name-text">상대를 선택하세요</span></div>
                </div>
                <button class="action-btn" onclick="confirmChatStart()">채팅방 입장</button>
            </div>

            <div style="display:flex; gap:8px; margin-top:20px;">
                <button class="sub-btn" style="flex:1" onclick="openMyPage()">설정</button>
                <button class="sub-btn" style="flex:1" onclick="startLogout()">로그아웃</button>
            </div>
        </div>
    </div>

    <!-- 4. 채팅방 섹션 -->
    <div id="chat-section" class="section">
        <header class="chat-header">
            <div id="chat-title" style="display:flex; align-items:center; font-weight:800; gap:8px;"></div>
            <button onclick="exitChat()" class="sub-btn" style="background:rgba(255,255,255,0.2); color:white; padding:6px 12px;">닫기</button>
        </header>
        <div id="chat-display"></div>
        <div class="input-wrap">
            <div class="main-input-row">
                <button class="sub-btn" onclick="triggerFile()" style="border-radius:50%; width:44px; height:44px; padding:0;">📎</button>
                <input type="file" id="chatFileInput" style="display:none" onchange="uploadChatFile(this)">
                <input type="text" id="msgInput" placeholder="메시지 입력..." onkeypress="if(event.keyCode==13) sendMsg()">
                <button id="sendBtn" class="action-btn" style="width:auto; padding:10px 20px;" onclick="sendMsg()">전송</button>
            </div>
        </div>
    </div>

    <!-- 모달들 -->
    <div id="alert-modal" class="modal-overlay">
        <div class="modal-content" style="text-align:center;"><h4 id="alert-title">안내</h4><p id="alert-msg"></p><button class="action-btn" onclick="closeModal('alert-modal')">확인</button></div>
    </div>

    <div id="name-modal" class="modal-overlay">
        <div class="modal-content">
            <h4 style="margin-bottom:15px; text-align:center;">이름 선택</h4>
            <div id="name-grid" style="display:grid; grid-template-columns: repeat(4,1fr); gap:6px;"></div>
            <button class="sub-btn" style="width:100%; margin-top:15px;" onclick="closeModal('name-modal')">취소</button>
        </div>
    </div>

    <div id="mypage-modal" class="modal-overlay">
        <div class="modal-content">
            <h4 style="text-align:center;">프로필 설정</h4>
            <div style="text-align:center; margin-bottom:15px;">
                <div class="avatar-circle" style="cursor:pointer;" onclick="document.getElementById('editImgInput').click()">
                    <img id="edit-avatar-preview" src="">
                </div>
                <input type="file" id="editImgInput" style="display:none" accept="image/*" onchange="previewEditImg(this)">
            </div>
            <div class="input-group">
                <span class="select-label">비밀번호</span>
                <input type="password" id="editPw" class="custom-input" maxlength="4">
            </div>
            <div id="membership-theme-area" style="display:none; border-top:1px solid #eee; padding-top:15px; margin-top:15px;">
                <span class="select-label" style="color:var(--membership)">✨ 퍼플톡 패스 전용 테마</span>
                <div class="theme-selector">
                    <div id="theme-p" class="theme-btn" onclick="setTheme('purple')">보라색</div>
                    <div id="theme-y" class="theme-btn" onclick="setTheme('yellow')">노란색</div>
                </div>
            </div>
            <button class="action-btn" onclick="saveMyPage()" style="margin-top:15px;">저장</button>
            <button class="sub-btn" style="width:100%; margin-top:8px;" onclick="closeModal('mypage-modal')">닫기</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://class-chat-6-7-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const students = {"강유주":"6701","고윤서":"6702","공윤호":"6703","김성민":"6704","김태윤":"6705","나현웅":"6706","류찬혁":"6707","문예린":"6708","박소율":"6709","박채윤":"6710","배예람":"6711","백한율":"6712","우은서":"6713","우진서":"6714","윤소영":"6715","임소윤":"6716","임수현":"6717","정시후":"6718","조수빈":"6719","최리한":"6720","최은수":"6721","최준성":"6722","하예준":"6723","허단":"6724", "관리자":"1234"};
        let myName = "", targetNames = [], currentRoomId = "", chatRef = null, selLoginName = "", allProfiles = {};

        function updateClock() {
            const now = new Date();
            const year = now.getFullYear(); const month = String(now.getMonth() + 1).padStart(2, '0'); const day = String(now.getDate()).padStart(2, '0');
            const weekDays = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
            let hours = now.getHours(); const ampm = hours >= 12 ? '오후' : '오전'; hours = hours % 12 || 12;
            document.getElementById('clock-display').innerText = `${year}년 ${month}월 ${day}일 ${weekDays[now.getDay()]} ${ampm} ${String(hours).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        }
        setInterval(updateClock, 1000); updateClock();

        function showAppAlert(title, msg) {
            document.getElementById('alert-title').innerText = title; document.getElementById('alert-msg').innerText = msg;
            document.getElementById('alert-modal').classList.add('active');
        }

        function openNameModal(type) {
            const grid = document.getElementById('name-grid'); grid.innerHTML = "";
            Object.keys(students).sort().forEach(name => {
                if(type === 'target' && name === myName) return;
                const btn = document.createElement('button'); btn.className = "name-btn";
                btn.innerText = name;
                btn.onclick = () => {
                    if(type === 'login') { selLoginName = name; document.getElementById('login-name-text').innerText = name; }
                    else { targetNames = [name]; document.getElementById('target-name-text').innerText = name; }
                    closeModal('name-modal');
                };
                grid.appendChild(btn);
            });
            document.getElementById('name-modal').classList.add('active');
        }

        async function handleLogin() {
            if(!selLoginName) return showAppAlert("알림", "이름을 선택하세요.");
            const pw = document.getElementById('loginPw').value;
            const snap = await db.ref('profiles/'+selLoginName).once('value');
            const data = snap.val() || { pw: students[selLoginName] };
            if(data.pw !== pw) return showAppAlert("실패", "비밀번호가 틀렸습니다.");
            
            myName = selLoginName;
            if(myName === '관리자') { showSection('admin-section'); listenAdmin(); }
            else { showSection('select-section'); syncProfiles(); }
        }

        function syncProfiles() {
            db.ref('profiles').on('value', snap => {
                allProfiles = snap.val() || {};
                const myData = allProfiles[myName] || {};
                const hasMembership = myData.membership === true;
                
                // 내 정보 업데이트
                document.getElementById('my-profile-img').src = myData.img || '';
                document.getElementById('my-name-display').innerHTML = `${myName} ${hasMembership ? '<span style="color:var(--membership)">⭐</span>' : ''}`;
                document.getElementById('my-membership-badge').innerText = hasMembership ? '⭐' : '';
                
                // 테마 적용
                if(hasMembership && myData.theme === 'yellow') {
                    document.body.className = 'theme-yellow';
                } else {
                    document.body.className = 'theme-purple';
                }
                
                renderFriendList();
            });
        }

        function renderFriendList() {
            const list = document.getElementById('main-friend-list');
            list.innerHTML = "";
            let count = 0;
            Object.keys(students).sort().forEach(name => {
                if(name === myName || name === '관리자') return;
                count++;
                const p = allProfiles[name] || {};
                const isMember = p.membership === true;
                const item = document.createElement('div');
                item.className = "friend-item";
                item.innerHTML = `
                    <div class="avatar-circle" style="width:45px; height:45px; border-radius:15px; margin:0 12px 0 0;">
                        <img src="${p.img || ''}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
                        ${isMember ? '<span class="membership-badge" style="font-size:12px;">⭐</span>' : ''}
                    </div>
                    <div class="friend-info">
                        <div class="friend-name">${name} ${isMember ? '<span style="font-size:10px; color:var(--membership)">PASS</span>' : ''}</div>
                    </div>
                `;
                item.onclick = () => { targetNames = [name]; confirmChatStart(); };
                list.appendChild(item);
            });
            document.getElementById('friend-count').innerText = count;
        }

        function setHomeTab(tab) {
            document.getElementById('view-friends').style.display = tab === 'friends' ? 'block' : 'none';
            document.getElementById('view-start').style.display = tab === 'start' ? 'block' : 'none';
            document.getElementById('tab-friends').className = tab === 'friends' ? 'tab-item active' : 'tab-item';
            document.getElementById('tab-start').className = tab === 'start' ? 'tab-item active' : 'tab-item';
        }

        function listenAdmin() {
            db.ref('profiles').on('value', snap => {
                const profiles = snap.val() || {};
                const container = document.getElementById('admin-student-list');
                container.innerHTML = "";
                Object.keys(students).sort().forEach(name => {
                    if(name === '관리자') return;
                    const p = profiles[name] || {};
                    const isMember = p.membership === true;
                    const div = document.createElement('div');
                    div.className = "friend-item";
                    div.style.cursor = "default";
                    div.innerHTML = `
                        <div class="friend-info">
                            <div class="friend-name">${name} ${isMember ? '⭐' : ''}</div>
                        </div>
                        <button class="sub-btn" style="font-size:11px; padding:6px 10px; background:${isMember ? '#ff5252' : '#6a1b9a'}; color:white;" 
                                onclick="toggleMembership('${name}', ${isMember})">
                            ${isMember ? '해지' : '부여'}
                        </button>
                    `;
                    container.appendChild(div);
                });
            });
        }

        async function toggleMembership(name, current) {
            await db.ref(`profiles/${name}/membership`).set(!current);
        }

        function confirmChatStart() {
            if(targetNames.length === 0) return showAppAlert("알림", "상대를 선택하세요.");
            currentRoomId = [myName, ...targetNames].sort().join("_");
            chatRef = db.ref('chats/'+currentRoomId);
            
            const tImg = (allProfiles[targetNames[0]]?.img) || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('chat-title').innerHTML = `<img src="${tImg}" style="width:30px; height:30px; border-radius:10px;"> ${targetNames[0]}`;
            document.getElementById('clock-display').className = "global-clock clock-center";
            showSection('chat-section');
            listenMsgs();
        }

        function listenMsgs() {
            chatRef.off();
            chatRef.on('value', snap => {
                const display = document.getElementById('chat-display'); display.innerHTML = "";
                let lastDate = "";
                snap.forEach(child => {
                    const m = child.val();
                    const d = new Date(m.time); const dateStr = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
                    if(dateStr !== lastDate) {
                        const div = document.createElement('div'); div.className = "date-divider"; div.innerText = dateStr;
                        display.appendChild(div); lastDate = dateStr;
                    }
                    const isMe = m.sender === myName;
                    const row = document.createElement('div'); row.className = `msg-row ${isMe ? 'me' : 'other'}`;
                    
                    let content = m.text || "";
                    if(m.file) {
                        if(m.file.type?.startsWith('image/')) content = `<img src="${m.file.data}" style="max-width:180px; border-radius:10px;">`;
                        else content = `<div style="font-weight:700;">📎 ${m.file.name}</div>`;
                    }

                    row.innerHTML = `
                        <div class="bubble">${content}</div>
                        <div style="margin: 0 5px; font-size:9px; color:#aaa;">${formatTime(m.time)}
                            ${isMe ? `<br><button class="delete-trigger-btn" onclick="deleteMsg('${child.key}')">삭제</button>` : ''}
                        </div>
                    `;
                    display.appendChild(row);
                });
                display.scrollTop = display.scrollHeight;
            });
        }

        function formatTime(ts) {
            const d = new Date(ts); let h = d.getHours(); const am = h < 12 ? '오전' : '오후'; h = h % 12 || 12;
            return `${am} ${h}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        async function deleteMsg(key) { if(confirm("삭제할까요?")) await chatRef.child(key).remove(); }

        function sendMsg(fileObj = null) {
            const input = document.getElementById('msgInput');
            if(!input.value && !fileObj) return;
            chatRef.push({ sender: myName, text: input.value, file: fileObj, time: Date.now() });
            input.value = "";
        }

        function triggerFile() { document.getElementById('chatFileInput').click(); }
        function uploadChatFile(input) {
            if(input.files[0]) {
                const f = input.files[0]; const r = new FileReader();
                r.onload = e => sendMsg({ name: f.name, type: f.type, data: e.target.result });
                r.readAsDataURL(f);
            }
        }

        function openMyPage() {
            const p = allProfiles[myName] || {};
            document.getElementById('edit-avatar-preview').src = p.img || '';
            document.getElementById('editPw').value = p.pw || students[myName];
            document.getElementById('membership-theme-area').style.display = p.membership ? 'block' : 'none';
            if(p.membership) {
                document.getElementById('theme-p').className = p.theme !== 'yellow' ? 'theme-btn active' : 'theme-btn';
                document.getElementById('theme-y').className = p.theme === 'yellow' ? 'theme-btn active' : 'theme-btn';
            }
            document.getElementById('mypage-modal').classList.add('active');
        }

        function previewEditImg(i) { if(i.files[0]) { const r = new FileReader(); r.onload = e => document.getElementById('edit-avatar-preview').src = e.target.result; r.readAsDataURL(i.files[0]); } }

        let selectedTheme = 'purple';
        function setTheme(t) {
            selectedTheme = t;
            document.getElementById('theme-p').className = t === 'purple' ? 'theme-btn active' : 'theme-btn';
            document.getElementById('theme-y').className = t === 'yellow' ? 'theme-btn active' : 'theme-btn';
        }

        async function saveMyPage() {
            const p = allProfiles[myName] || {};
            await db.ref('profiles/'+myName).update({
                pw: document.getElementById('editPw').value,
                img: document.getElementById('edit-avatar-preview').src,
                theme: selectedTheme
            });
            showAppAlert("성공", "저장되었습니다.");
            closeModal('mypage-modal');
        }

        function startLogout() {
            document.getElementById('loading-overlay').style.display = 'flex';
            setTimeout(() => location.reload(), 1000);
        }

        function exitChat() {
            if(chatRef) chatRef.off();
            document.getElementById('clock-display').className = "global-clock clock-left";
            showSection('select-section');
        }

        function showSection(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    </script>
</body>
</html>
