<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>6-7반 톡톡</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --p-main: #6a1b9a; --p-dark: #4a148c; --p-mid: #9c27b0; --p-light: #f3e5f5; 
            --white: #ffffff; --gray: #f0f0f5; --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --accent: #ff4081;
        }
        * { box-sizing: border-box; transition: all 0.2s ease; font-family: 'Pretendard', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%;
            background: var(--gray); 
            overflow: hidden; 
            position: fixed; 
        }

        /* [상단 시계] */
        .global-clock {
            position: fixed; top: 15px; font-size: 13px; font-weight: 800; color: var(--p-main); z-index: 1000;
            background: rgba(255,255,255,0.9); padding: 8px 18px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            backdrop-filter: blur(10px); border: 1px solid var(--p-light);
        }
        .clock-left { left: 20px; }
        .clock-center { left: 50%; transform: translateX(-50%); }

        .section { 
            display: none; 
            height: 100%; 
            width: 100%; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }
        .active { display: flex; }

        #chat-section { padding: 0; justify-content: flex-start; }

        .card { 
            background: var(--white); padding: 35px; border-radius: 40px; box-shadow: var(--shadow); 
            width: 100%; max-width: 420px; text-align: center; border: 1px solid rgba(255,255,255,0.8);
        }

        .avatar-wrap { position: relative; width: 120px; height: 120px; margin: 0 auto 25px; }
        .avatar-circle {
            width: 100%; height: 100%; border-radius: 50%; background: #eee; 
            display: flex; justify-content: center; align-items: center; border: 4px solid var(--white);
            box-shadow: 0 8px 20px rgba(106, 27, 154, 0.15); overflow: hidden;
        }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-small { width: 42px; height: 42px; margin-right: 12px; border: 2px solid #fff; flex-shrink: 0; border-radius: 50%; overflow: hidden; }

        .input-group { text-align: left; margin-bottom: 22px; width: 100%; }
        .select-label { font-size: 14px; color: var(--p-main); font-weight: 700; margin-bottom: 8px; display: block; padding-left: 5px; }
        .custom-input, .select-box {
            width: 100%; padding: 18px; border-radius: 20px; border: 2px solid var(--p-light);
            font-size: 16px; outline: none; background: #fafafa; cursor: pointer;
        }

        .chat-header {
            width: 100%; background: var(--p-main); color: white; 
            padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10;
            padding-top: env(safe-area-inset-top, 15px);
        }
        
        #chat-display { 
            flex: 1; 
            width: 100%; 
            max-width: 800px; 
            overflow-y: auto; 
            padding: 20px 0; 
            display: flex; 
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }

        .date-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 25px 0;
            width: 100%;
        }
        .date-divider span {
            background: rgba(0,0,0,0.15);
            color: white;
            font-size: 11px;
            padding: 4px 15px;
            border-radius: 15px;
            font-weight: 500;
        }

        .input-wrap { 
            width: 100%; 
            background: white; 
            padding: 10px 15px 25px; 
            border-top: 1px solid #eee; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            padding-bottom: env(safe-area-inset-bottom, 25px);
        }
        
        .main-input-row { display: flex; gap: 10px; align-items: center; max-width: 800px; width: 100%; margin: 0 auto; }
        #msgInput { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1.5px solid #eee; background: #f9f9fb; font-size: 16px; outline: none; }
        #sendBtn { background: var(--p-main); color: white; border: none; padding: 12px 22px; border-radius: 20px; font-weight: 800; cursor: pointer; }

        .msg-row { display: flex; max-width: 88%; align-items: flex-end; margin-bottom: 18px; padding: 0 15px; position: relative; }
        .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }
        
        .bubble { 
            padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.5;
            background: white; box-shadow: 0 3px 10px rgba(0,0,0,0.05);
            max-width: 100%;
            word-break: break-all;
        }
        .me .bubble { background: var(--p-main); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { border-bottom-left-radius: 4px; }
        .bubble img { max-width: 240px; border-radius: 12px; display: block; margin-top: 8px; cursor: pointer; }

        .file-card {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 12px;
            margin-top: 5px;
            text-decoration: none;
            color: inherit;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .me .file-card { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.3); color: white; }
        .file-icon { font-size: 24px; margin-right: 10px; }
        .file-info { display: flex; flex-direction: column; overflow: hidden; }
        .file-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-size { font-size: 11px; opacity: 0.7; }

        .msg-time {
            font-size: 10px;
            color: #aaa;
            margin: 0 6px;
            white-space: nowrap;
            margin-bottom: 4px;
        }

        /* [모달 및 알림창 디자인] */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            display: none; justify-content: center; align-items: center; z-index: 3000; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #fff; border-radius: 35px; padding: 30px; width: 90%; max-width: 400px; 
            max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
        }
        .active { display: flex !important; }

        .action-btn { padding: 18px; border-radius: 22px; border: none; background: var(--p-main); color: #fff; font-weight: 800; cursor: pointer; font-size: 16px; width: 100%; }
        .sub-btn { padding: 15px; border-radius: 18px; border: none; background: #f0f0f5; color: #555; font-weight: 700; cursor: pointer; font-size: 14px; }
        
        /* 알림용(Custom Alert) 스타일 */
        .alert-card { text-align: center; }
        .alert-icon { font-size: 40px; margin-bottom: 15px; display: block; }
        .alert-title { font-size: 20px; font-weight: 800; color: var(--p-dark); margin-bottom: 10px; }
        .alert-msg { font-size: 15px; color: #666; margin-bottom: 25px; line-height: 1.5; }

        /* 토스트 메시지 */
        #toast-container {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            z-index: 9999; pointer-events: none;
        }
        .toast {
            background: rgba(0,0,0,0.8); color: white; padding: 12px 25px; border-radius: 30px;
            font-size: 14px; margin-bottom: 10px; opacity: 0; transition: all 0.3s ease;
            transform: translateY(20px); box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .toast.show { opacity: 1; transform: translateY(0); }

        @media screen and (max-width: 480px) {
            .card { padding: 25px; border-radius: 30px; }
            .global-clock { font-size: 12px; padding: 6px 14px; top: 10px; }
            .bubble { font-size: 14px; padding: 10px 14px; }
            #msgInput { font-size: 14px; padding: 10px 16px; }
            #sendBtn { padding: 10px 18px; font-size: 14px; }
            .avatar-wrap { width: 100px; height: 100px; }
            .bubble img { max-width: 180px; }
        }
    </style>
</head>
<body>

    <div id="clock-display" class="global-clock clock-left"></div>

    <!-- 토스트 컨테이너 -->
    <div id="toast-container"></div>

    <!-- 로그인 -->
    <div id="login-section" class="section active">
        <div class="card">
            <h1 style="color:var(--p-main); margin-bottom:30px; font-size: 24px;">6-7반 비밀 톡톡 🔒</h1>
            <div class="input-group">
                <span class="select-label">이름 선택</span>
                <div class="select-box" onclick="openNameModal('login')">
                    <span id="login-name-text">목록에서 선택</span><span style="float:right">▼</span>
                </div>
            </div>
            <div class="input-group">
                <span class="select-label">비밀번호</span>
                <input type="password" id="loginPw" class="custom-input" placeholder="초기 비번: 번호4자리">
            </div>
            <button class="action-btn" onclick="handleLogin()">시작하기</button>
        </div>
    </div>

    <!-- 홈 -->
    <div id="select-section" class="section">
        <div class="card">
            <div class="avatar-wrap">
                <div class="avatar-circle"><img id="home-avatar" src="" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'"></div>
            </div>
            <h2 id="home-welcome" style="margin-bottom:25px; color:var(--p-dark); font-size: 20px;">...님 환영합니다!</h2>
            <div class="input-group">
                <span class="select-label">대화 상대</span>
                <div class="select-box" onclick="openNameModal('target')">
                    <span id="target-name-text">상대를 선택하세요</span><span style="float:right">▼</span>
                </div>
            </div>
            <button class="action-btn" onclick="confirmChatStart()">채팅 시작</button>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="sub-btn" style="flex:1" onclick="openMyPage()">마이페이지</button>
                <button class="sub-btn" style="flex:1" onclick="location.reload()">로그아웃</button>
            </div>
        </div>
    </div>

    <!-- 채팅 -->
    <div id="chat-section" class="section">
        <header class="chat-header">
            <div id="chat-title" style="display:flex; align-items:center; font-weight:800; font-size:18px;"></div>
            <button onclick="exitChat()" style="background:rgba(255,255,255,0.25); border:none; color:white; padding:8px 15px; border-radius:12px; font-weight:700;">나가기</button>
        </header>
        <div id="chat-display"></div>
        <div class="input-wrap">
            <div style="display:flex; gap:10px;">
                <button class="sub-btn" style="padding: 8px 12px;" onclick="triggerImg()" title="이미지 전송">📸</button>
                <button class="sub-btn" style="padding: 8px 12px;" onclick="triggerFile()" title="파일 전송">📎</button>
                <button class="sub-btn" style="padding: 8px 12px;" onclick="showAlert('준비 중', '예약 목록 기능은 현재 개발 중입니다!', '⏰')">⏰</button>
                <input type="file" id="chatImgInput" style="display:none" accept="image/*" onchange="uploadChatImg(this)">
                <input type="file" id="chatFileInput" style="display:none" onchange="uploadChatFile(this)">
            </div>
            <div class="main-input-row">
                <input type="text" id="msgInput" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendMsg()">
                <button id="sendBtn" onclick="sendMsg()">전송</button>
            </div>
        </div>
    </div>

    <!-- [공용 모달들] -->
    
    <!-- 이름 선택 모달 -->
    <div id="name-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top:0; color:var(--p-main);">학생 선택</h3>
            <div id="name-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-height:400px; overflow-y:auto;"></div>
            <button class="sub-btn" style="width:100%; margin-top:20px;" onclick="closeModal('name-modal')">닫기</button>
        </div>
    </div>

    <!-- 마이페이지 모달 -->
    <div id="mypage-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top:0; color:var(--p-main);">마이페이지</h3>
            <div class="avatar-wrap" style="width:80px; height:80px;">
                <div class="avatar-circle"><img id="edit-avatar-preview" src=""></div>
            </div>
            <button class="sub-btn" style="width:100%; margin-bottom:15px;" onclick="document.getElementById('profileInput').click()">사진 변경</button>
            <input type="file" id="profileInput" style="display:none" accept="image/*" onchange="previewProfile(this)">
            
            <div class="input-group">
                <span class="select-label">비밀번호 변경</span>
                <input type="text" id="newPw" class="custom-input" placeholder="새 비밀번호 입력">
            </div>
            <div style="display:flex; gap:10px;">
                <button class="action-btn" style="flex:2" onclick="saveMyInfo()">저장</button>
                <button class="sub-btn" style="flex:1" onclick="closeModal('mypage-modal')">취소</button>
            </div>
        </div>
    </div>

    <!-- 알림용 커스텀 모달 (Alert 대체) -->
    <div id="custom-alert-modal" class="modal-overlay">
        <div class="modal-content alert-card">
            <span id="alert-icon" class="alert-icon">⚠️</span>
            <div id="alert-title" class="alert-title">알림</div>
            <div id="alert-msg" class="alert-msg">메시지 내용이 들어갑니다.</div>
            <button class="action-btn" onclick="closeModal('custom-alert-modal')">확인</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://class-chat-6-7-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const students = {"강유주":"6701","고윤서":"6702","공윤호":"6703","김성민":"6704","김태윤":"6705","나현웅":"6706","류찬혁":"6707","문예린":"6708","박소율":"6709","박채윤":"6710","배예람":"6711","백한율":"6712","우은서":"6713","우진서":"6714","윤소영":"6715","임소윤":"6716","임수현":"6717","정시후":"6718","조수빈":"6719","최리한":"6720","최은수":"6721","최준성":"6722","하예준":"6723","허단":"6724"};
        let myName = "", targetName = "", chatRef = null, selLoginName = "";
        let allProfiles = {};

        /* [UI 헬퍼 함수] */
        function showAlert(title, msg, icon = "⚠️") {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('alert-icon').innerText = icon;
            document.getElementById('custom-alert-modal').classList.add('active');
        }

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 100);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        function formatTime(timestamp) {
            if(!timestamp) return "";
            const date = new Date(timestamp);
            let h = date.getHours();
            const m = String(date.getMinutes()).padStart(2, '0');
            const ap = h >= 12 ? "오후" : "오전";
            h = h % 12 || 12;
            return `${ap} ${h}:${m}`;
        }

        function formatDateDivider(timestamp) {
            const date = new Date(timestamp);
            const y = date.getFullYear();
            const m = date.getMonth() + 1;
            const d = date.getDate();
            const day = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"][date.getDay()];
            return `${y}년 ${m}월 ${d}일 ${day}`;
        }

        setInterval(() => {
            const now = new Date();
            const y = now.getFullYear();
            const mon = now.getMonth() + 1;
            const d = now.getDate();
            const day = ["일", "월", "화", "수", "목", "금", "토"][now.getDay()];
            let h = now.getHours();
            const ap = h >= 12 ? "오후" : "오전";
            h = h % 12 || 12;
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const display = document.getElementById('clock-display');
            if(display) display.innerText = `${y}-${mon}-${d}(${day}) ${ap} ${h}:${m}:${s}`;
        }, 1000);

        function openNameModal(type) {
            const grid = document.getElementById('name-grid');
            grid.innerHTML = "";
            Object.keys(students).sort().forEach(name => {
                if(type === 'target' && name === myName) return;
                const btn = document.createElement('div');
                btn.className = "sub-btn";
                btn.style.textAlign = "center";
                btn.innerText = name;
                btn.onclick = () => {
                    if(type === 'login') {
                        selLoginName = name;
                        document.getElementById('login-name-text').innerText = name;
                    } else {
                        targetName = name;
                        document.getElementById('target-name-text').innerText = name;
                    }
                    closeModal('name-modal');
                };
                grid.appendChild(btn);
            });
            document.getElementById('name-modal').classList.add('active');
        }

        async function handleLogin() {
            const pw = document.getElementById('loginPw').value;
            if(!selLoginName) return showAlert("선택 미흡", "로그인할 이름을 먼저 선택해주세요.");
            if(!pw) return showAlert("입력 미흡", "비밀번호를 입력해주세요.");

            const snap = await db.ref('profiles/'+selLoginName).once('value');
            const data = snap.val() || { pw: students[selLoginName] };
            if(data.pw !== pw) return showAlert("로그인 실패", "비밀번호가 일치하지 않습니다. 다시 확인해주세요.");
            
            myName = selLoginName;
            syncProfiles();
            showSection('select-section');
            showToast(`${myName}님, 환영합니다! ✨`);
        }

        function syncProfiles() {
            db.ref('profiles').on('value', snap => {
                allProfiles = snap.val() || {};
                const myData = allProfiles[myName] || {};
                const homeAv = document.getElementById('home-avatar');
                if(homeAv) homeAv.src = myData.img || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                const homeWel = document.getElementById('home-welcome');
                if(homeWel) homeWel.innerText = `${myName}님 환영합니다!`;
            });
        }

        function confirmChatStart() {
            if(!targetName) return showAlert("상대 선택", "누구와 대화하고 싶나요? 상대를 선택해주세요.");
            const roomId = [myName, targetName].sort().join("_");
            chatRef = db.ref('chats/'+roomId);
            
            const targetData = allProfiles[targetName] || {};
            const tImg = targetData.img || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('chat-title').innerHTML = `<img src="${tImg}" class="avatar-small" style="width:30px; height:30px; border-radius:50%;"> ${targetName}`;
            
            document.getElementById('clock-display').className = "global-clock clock-center";
            showSection('chat-section');
            listenMsgs();
        }

        function listenMsgs() {
            chatRef.off();
            chatRef.limitToLast(100).on('value', snap => {
                const display = document.getElementById('chat-display');
                display.innerHTML = "";
                let lastDate = "";

                snap.forEach(child => {
                    const m = child.val();
                    const isMe = m.sender === myName;
                    
                    const currentDate = new Date(m.time).toDateString();
                    if(currentDate !== lastDate) {
                        const divider = document.createElement('div');
                        divider.className = "date-divider";
                        divider.innerHTML = `<span>${formatDateDivider(m.time)}</span>`;
                        display.appendChild(divider);
                        lastDate = currentDate;
                    }

                    const row = document.createElement('div');
                    row.className = `msg-row ${isMe ? 'me' : 'other'}`;
                    
                    const senderImg = (allProfiles[m.sender] && allProfiles[m.sender].img) ? allProfiles[m.sender].img : 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                    const timeStr = formatTime(m.time);
                    
                    let contentHtml = "";
                    if(m.img) {
                        contentHtml += `<img src="${m.img}" onclick="window.open(this.src)">`;
                    }
                    if(m.file) {
                        contentHtml += `
                            <a href="${m.file.data}" download="${m.file.name}" class="file-card">
                                <div class="file-icon">📁</div>
                                <div class="file-info">
                                    <div class="file-name">${m.file.name}</div>
                                    <div class="file-size">${m.file.size}</div>
                                </div>
                            </a>
                        `;
                    }
                    if(m.text) {
                        contentHtml += `<div>${m.text}</div>`;
                    }

                    row.innerHTML = `
                        ${isMe ? '' : `<img src="${senderImg}" class="avatar-small">`}
                        <div class="bubble">${contentHtml}</div>
                        <div class="msg-time">${timeStr}</div>
                    `;
                    display.appendChild(row);
                });
                display.scrollTop = display.scrollHeight;
            });
        }

        function sendMsg(imgData = null, fileObj = null) {
            const input = document.getElementById('msgInput');
            if(!input.value.trim() && !imgData && !fileObj) return;
            chatRef.push({
                sender: myName,
                text: input.value,
                img: imgData,
                file: fileObj,
                time: Date.now()
            });
            input.value = "";
        }

        function openMyPage() {
            const myData = allProfiles[myName] || {};
            document.getElementById('edit-avatar-preview').src = myData.img || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('newPw').value = "";
            document.getElementById('mypage-modal').classList.add('active');
        }

        function saveMyInfo() {
            const img = document.getElementById('edit-avatar-preview').src;
            const pw = document.getElementById('newPw').value;
            const update = { img: img };
            if(pw.trim()) update.pw = pw;
            db.ref('profiles/'+myName).update(update).then(() => {
                showToast("정보가 안전하게 저장되었습니다. ✅");
                closeModal('mypage-modal');
            });
        }

        function previewProfile(input) {
            if(input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('edit-avatar-preview').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }

        function exitChat() {
            if(chatRef) chatRef.off();
            document.getElementById('clock-display').className = "global-clock clock-left";
            showSection('select-section');
        }

        function triggerImg() { document.getElementById('chatImgInput').click(); }
        function uploadChatImg(input) {
            if(input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => sendMsg(e.target.result);
                reader.readAsDataURL(input.files[0]);
                input.value = ""; 
                showToast("이미지를 전송 중입니다...");
            }
        }

        function triggerFile() { document.getElementById('chatFileInput').click(); }
        function uploadChatFile(input) {
            if(input.files && input.files[0]) {
                const file = input.files[0];
                const reader = new FileReader();
                reader.onload = e => {
                    const fileObj = {
                        name: file.name,
                        size: (file.size / 1024).toFixed(1) + " KB",
                        data: e.target.result
                    };
                    sendMsg(null, fileObj);
                    showToast("파일을 전송했습니다.");
                };
                reader.readAsDataURL(file);
                input.value = "";
            }
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    </script>
</body>
</html>
