<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>퍼플톡 버전 관리</title>
    
    <!-- Firebase SDK (v8.html과 동일한 compat 버전 사용) -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        /* v8.html의 핵심 CSS 변수 및 디자인 시스템 이식 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root { 
            --p-main: #6a1b9a; --p-dark: #4a148c; --p-mid: #9c27b0; --p-light: #f3e5f5; 
            --white: #ffffff; --gray: #f0f0f5; --shadow: 0 10px 30px rgba(0,0,0,0.1);
            --danger: #ff5252; --success: #4caf50; 
        }
        
        * { box-sizing: border-box; transition: all 0.3s ease; font-family: 'Pretendard', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--gray); overflow: hidden; position: fixed; }

        #fade-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--white); z-index: 10000; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
        #fade-overlay.visible { opacity: 1; pointer-events: auto; }

        .global-clock { position: fixed; top: 15px; font-size: 13px; font-weight: 800; color: var(--p-main); z-index: 1000; background: rgba(255,255,255,0.92); padding: 8px 18px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); backdrop-filter: blur(10px); border: 1px solid var(--p-light); }
        .clock-center { left: 50%; transform: translateX(-50%); }

        .section { display: none; height: 100%; width: 100%; flex-direction: column; justify-content: center; align-items: center; padding: 20px; opacity: 0; transform: translateY(10px); }
        .active { display: flex !important; opacity: 1; transform: translateY(0); }

        /* 카드 UI */
        .card { background: var(--white); padding: 30px; border-radius: 35px; box-shadow: var(--shadow); width: 100%; text-align: center; border: 1px solid rgba(255,255,255,0.8); max-height: 90vh; display: flex; flex-direction: column; }
        
        /* 입력 폼 UI */
        .input-group { text-align: left; margin-bottom: 15px; width: 100%; }
        .select-label { font-size: 12px; color: var(--p-main); font-weight: 800; margin-bottom: 6px; display: block; padding-left: 5px; }
        .custom-input { width: 100%; padding: 16px; border-radius: 20px; border: 2.5px solid var(--p-light); font-size: 16px; outline: none; background: #fafafa; font-weight: 600; }
        .custom-input:focus { border-color: var(--p-main); background: #fff; }

        /* 버튼 UI */
        .action-btn { padding: 16px; border-radius: 20px; border: none; background: var(--p-main); color: #fff; font-weight: 800; cursor: pointer; width: 100%; font-size: 16px; box-shadow: 0 4px 12px rgba(106,27,154,0.2); }
        .action-btn:active { transform: scale(0.98); }
        .sub-btn { padding: 12px; border-radius: 15px; border: none; background: #f0f0f5; color: #555; font-weight: 700; cursor: pointer; }
        .sub-btn:active { background: #e4e4eb; }

        /* 리스트 UI */
        .friend-list { width: 100%; text-align: left; overflow-y: auto; flex: 1; padding: 5px; }
        .friend-item { display: flex; align-items: center; padding: 16px; border-radius: 25px; cursor: pointer; margin-bottom: 12px; background: #f9f9fb; border: 1px solid transparent; }
        .friend-item:hover { border-color: var(--p-light); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .friend-item:active { background: var(--p-light); }

        .avatar-circle { display: flex; justify-content: center; align-items: center; border-radius: 20px; background: var(--white); box-shadow: 0 4px 10px rgba(0,0,0,0.05); flex-shrink: 0; font-weight: 900; color: var(--p-main); font-size: 18px; }

        /* 모달 UI */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 5000; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #fff; border-radius: 35px; padding: 30px; width: 92%; max-width: 420px; max-height: 85vh; overflow-y: auto; position: relative; }

        /* 체크박스 디자인 */
        .custom-checkbox { width: 22px; height: 22px; accent-color: var(--p-main); cursor: pointer; }

        /* 스크롤바 숨기기 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--p-light); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="fade-overlay"></div>
    <div id="clock-display" class="global-clock clock-center"></div>

    <!-- 1. 접속 환경 선택 섹션 -->
    <div id="env-section" class="section active">
        <div class="card" style="max-width: 420px;">
            <div class="avatar-circle" style="width: 80px; height: 80px; margin: 0 auto 20px; font-size: 35px; background: var(--p-main); color: white;">P</div>
            <h2 style="color:var(--p-main); margin-bottom:10px;">PURPLE TALK 🚀</h2>
            <p style="color:#666; font-size:14px; margin-bottom:30px;">기기에 최적화된 화면을 제공합니다.</p>
            
            <div style="display:flex; flex-direction:column; gap:15px;">
                <button class="action-btn" style="background:var(--white); color:var(--p-main); border:2px solid var(--p-main);" onclick="setEnvironment('pc')">💻 PC 환경으로 접속</button>
                <button class="action-btn" onclick="setEnvironment('mobile')">📱 모바일 환경으로 접속</button>
            </div>
        </div>
    </div>

    <!-- 2. 메인 리스트 섹션 -->
    <div id="main-section" class="section">
        <!-- 환경에 따라 max-width가 JS에서 변경됨 -->
        <div id="main-card" class="card" style="max-width: 420px; height: 90vh;">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid var(--gray); padding-bottom: 15px; margin-bottom: 15px; flex-shrink: 0;">
                <h3 style="color:var(--p-main); margin:0; font-size: 20px;">버전 리스트</h3>
                
                <!-- 일반 사용자용 관리자 로그인 버튼 -->
                <button id="btn-admin-login" class="sub-btn" style="padding:8px 15px; font-size:12px; border-radius: 20px;" onclick="openModal('pw-modal')">🔒 관리자 인증</button>
                
                <!-- 관리자 인증 완료 후 나타나는 컨트롤 -->
                <div id="admin-controls" style="display:none; gap:8px;">
                    <button class="sub-btn" style="padding:8px 15px; font-size:12px; background:var(--p-main); color:white; border-radius: 20px;" onclick="openModal('add-modal')">+ 새 버전 추가</button>
                    <button class="sub-btn" style="padding:8px 15px; font-size:12px; border-radius: 20px;" onclick="logoutAdmin()">로그아웃</button>
                </div>
            </div>

            <div id="loading-indicator" style="color: var(--p-mid); font-weight: 800; font-size: 14px; margin-bottom: 10px; display: none;">데이터 동기화 중...</div>
            
            <div id="version-list" class="friend-list">
                <!-- 버전 데이터가 여기에 표시됩니다 -->
            </div>
        </div>
    </div>

    <!-- 모달: 관리자 비밀번호 -->
    <div id="pw-modal" class="modal-overlay">
        <div class="modal-content" style="text-align: center;">
            <div style="font-size:40px; margin-bottom:10px;">🔐</div>
            <h3 style="color:var(--p-main); margin-bottom: 20px;">관리자 인증</h3>
            
            <input type="password" id="pw-input" class="custom-input" placeholder="비밀번호 입력" style="text-align: center; font-size: 24px; letter-spacing: 5px; margin-bottom: 20px;" onkeypress="if(event.keyCode==13) verifyPassword()">
            
            <div style="display:flex; gap:10px;">
                <button class="sub-btn" style="flex:1;" onclick="closeModal('pw-modal')">취소</button>
                <button class="action-btn" style="flex:1; margin-top:0;" onclick="verifyPassword()">확인</button>
            </div>
        </div>
    </div>

    <!-- 모달: 새 버전 추가 -->
    <div id="add-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="color:var(--p-main); margin-bottom: 20px; text-align: center;">⚙️ 새 버전 링크 추가</h3>
            
            <div class="input-group">
                <span class="select-label">버전명</span>
                <input type="text" id="v-name" class="custom-input" placeholder="예: 퍼플톡 v6.7.2">
            </div>

            <label style="display:flex; align-items:center; gap:10px; font-size:14px; font-weight:800; color:var(--p-main); margin-bottom:15px; background: var(--p-light); padding: 15px; border-radius: 20px;">
                <input type="checkbox" id="use-github" class="custom-checkbox" onchange="toggleGithubInputs()">
                GitHub Pages 자동 생성
            </label>

            <div id="github-inputs" style="display: none;">
                <div class="input-group">
                    <span class="select-label">GitHub ID</span>
                    <input type="text" id="gh-id" class="custom-input" placeholder="ID 입력" oninput="updatePreviewLink()">
                </div>
                <div class="input-group">
                    <span class="select-label">Repository Name</span>
                    <input type="text" id="gh-repo" class="custom-input" placeholder="리포지토리 명" oninput="updatePreviewLink()">
                </div>
                <div class="input-group">
                    <span class="select-label">HTML 파일명</span>
                    <input type="text" id="gh-html" class="custom-input" placeholder="예: index (확장자 제외)" oninput="updatePreviewLink()">
                </div>
                <div style="background:var(--gray); padding:12px; border-radius:15px; font-size:11px; color:#666; margin-bottom: 15px; word-break: break-all;" id="link-preview">
                    생성될 링크: 
                </div>
            </div>

            <div id="manual-input">
                <div class="input-group">
                    <span class="select-label">수동 링크 입력</span>
                    <input type="text" id="v-link" class="custom-input" placeholder="https://...">
                </div>
            </div>

            <button class="action-btn" style="margin-top:10px;" onclick="saveVersionToFirebase()">저장하기</button>
            <button class="sub-btn" style="width:100%; margin-top:10px;" onclick="closeModal('add-modal')">닫기</button>
        </div>
    </div>

    <script>
        // ==========================================
        // Firebase 설정 (v8.html과 동일한 패턴)
        // ==========================================
        const firebaseConfig = {
            databaseURL: "https://class-chat-6-7-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ==========================================
        // 전역 상태 변수
        // ==========================================
        const ADMIN_PW = "384612";
        let versions = [];
        let currentEnv = 'pc';
        let isAdmin = false; // 핵심 보안 변수: 이 값이 true일 때만 삭제 버튼이 렌더링됨

        // 1. 실시간 시간 업데이트 (v8.html 로직 동일)
        function updateClock() {
            const now = new Date();
            const year = now.getFullYear(); 
            const month = String(now.getMonth() + 1).padStart(2, '0'); 
            const day = String(now.getDate()).padStart(2, '0');
            const weekDays = ["일", "월", "화", "수", "목", "금", "토"];
            let hours = now.getHours(); 
            const ampm = hours >= 12 ? '오후' : '오전'; 
            hours = hours % 12 || 12;
            document.getElementById('clock-display').innerText = 
                `${year}-${month}-${day}(${weekDays[now.getDay()]}) ${ampm} ${hours}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        }
        setInterval(updateClock, 1000); 
        updateClock();

        // 2. 환경 설정 (PC / Mobile 카드 폭 조정)
        function setEnvironment(env) {
            currentEnv = env;
            // v8.html의 card는 기본 max-width: 420px. PC인 경우 넓게 확장
            document.getElementById('main-card').style.maxWidth = (env === 'pc') ? '800px' : '420px';
            
            showSection('main-section');
            loadPreviousLocalData(); 
            fetchVersions();
        }

        // 3. 관리자 로그인 & 로그아웃 로직
        function verifyPassword() {
            const input = document.getElementById('pw-input').value;
            if (input === ADMIN_PW) {
                isAdmin = true;
                closeModal('pw-modal');
                document.getElementById('pw-input').value = '';
                
                // UI 변경
                document.getElementById('btn-admin-login').style.display = 'none';
                document.getElementById('admin-controls').style.display = 'flex';
                
                // 데이터 재렌더링 (삭제 버튼 표시를 위해)
                renderVersions();
            } else {
                alert("비밀번호가 올바르지 않습니다.");
                document.getElementById('pw-input').value = '';
            }
        }

        function logoutAdmin() {
            isAdmin = false;
            document.getElementById('btn-admin-login').style.display = 'inline-block';
            document.getElementById('admin-controls').style.display = 'none';
            renderVersions(); // 삭제 버튼 숨김
            alert("관리자 모드가 해제되었습니다.");
        }

        // 4. 모달 제어 및 UI 유틸리티
        function showSection(id) { 
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
        }
        function openModal(id) { 
            document.getElementById(id).classList.add('active'); 
            if(id === 'pw-modal') setTimeout(() => document.getElementById('pw-input').focus(), 100);
        }
        function closeModal(id) { 
            document.getElementById(id).classList.remove('active'); 
        }

        // 5. 링크 추가 로직 (GitHub 자동 생성 포함)
        function toggleGithubInputs() {
            const isGithub = document.getElementById('use-github').checked;
            document.getElementById('github-inputs').style.display = isGithub ? 'block' : 'none';
            document.getElementById('manual-input').style.display = isGithub ? 'none' : 'block';
        }

        function updatePreviewLink() {
            const id = document.getElementById('gh-id').value.trim();
            const repo = document.getElementById('gh-repo').value.trim();
            const html = document.getElementById('gh-html').value.trim();
            
            let link = "";
            if (id && repo && html) {
                link = `https://${id}.github.io/${repo}/${html}.html`;
                document.getElementById('link-preview').innerText = `생성될 링크: ${link}`;
            } else {
                document.getElementById('link-preview').innerText = `생성될 링크: 정보를 모두 입력해주세요.`;
            }
            return link;
        }

        // 6. Firebase 통신 (불러오기, 저장, 삭제)
        function fetchVersions() {
            const indicator = document.getElementById('loading-indicator');
            indicator.style.display = 'block';

            db.ref('versions').on('value', (snapshot) => {
                indicator.style.display = 'none';
                versions = [];
                const data = snapshot.val();
                
                if (data) {
                    Object.keys(data).forEach(key => {
                        versions.push({
                            id: key,
                            name: data[key].name,
                            link: data[key].link,
                            timestamp: data[key].timestamp
                        });
                    });
                    // 최신 버전이 위로 오도록 정렬
                    versions.sort((a, b) => b.timestamp - a.timestamp);
                }
                renderVersions();
            }, (error) => {
                console.error("Firebase 읽기 실패:", error);
                indicator.innerText = "데이터 불러오기 실패";
            });
        }

        function saveVersionToFirebase() {
            const name = document.getElementById('v-name').value.trim();
            const isGithub = document.getElementById('use-github').checked;
            let finalLink = "";

            if (isGithub) {
                finalLink = updatePreviewLink();
            } else {
                finalLink = document.getElementById('v-link').value.trim();
            }

            if (!name || !finalLink) {
                alert("버전명과 링크를 모두 입력해주세요.");
                return;
            }

            // 깃허브 아이디 로컬 보관 (다음 입력 편의용)
            if (isGithub) {
                localStorage.setItem('pt_last_gh_id', document.getElementById('gh-id').value.trim());
            }

            const versionData = {
                name: name,
                link: finalLink,
                timestamp: Date.now()
            };

            db.ref('versions').push(versionData)
            .then(() => {
                closeModal('add-modal');
                clearInputs();
            })
            .catch((error) => {
                console.error("저장 에러:", error);
                alert("저장에 실패했습니다.");
            });
        }

        function deleteVersion(id) {
            // isAdmin 상태가 아니면 아예 실행을 막음 (이중 방어)
            if (!isAdmin) return alert("권한이 없습니다."); 

            if (confirm("이 버전을 리스트에서 영구 삭제할까요?")) {
                db.ref('versions/' + id).remove()
                .catch((error) => {
                    console.error("삭제 에러:", error);
                    alert("삭제에 실패했습니다.");
                });
            }
        }

        function clearInputs() {
            document.getElementById('v-name').value = '';
            document.getElementById('v-link').value = '';
            document.getElementById('gh-repo').value = '';
            document.getElementById('gh-html').value = '';
            document.getElementById('link-preview').innerText = '생성될 링크: ';
        }

        function loadPreviousLocalData() {
            const savedId = localStorage.getItem('pt_last_gh_id');
            if (savedId) document.getElementById('gh-id').value = savedId;
        }

        // 7. 카드 렌더링
        function renderVersions() {
            const list = document.getElementById('version-list');
            list.innerHTML = '';

            if (versions.length === 0) {
                list.innerHTML = `
                    <div style="text-align:center; padding: 50px 20px; color:#aaa;">
                        <div style="font-size:40px; margin-bottom:10px;">📂</div>
                        <div style="font-weight: 800;">등록된 버전이 없습니다.</div>
                        <div style="font-size: 12px; margin-top:5px;">관리자 모드에서 새 버전을 추가해보세요.</div>
                    </div>
                `;
                return;
            }

            versions.forEach(v => {
                const item = document.createElement('div');
                item.className = "friend-item";
                item.onclick = () => window.open(v.link, '_blank');
                
                const date = new Date(v.timestamp);
                const dateStr = `${date.getMonth()+1}월 ${date.getDate()}일`;

                // [보안/핵심] isAdmin 상태에 따라 우측 버튼이 '삭제'가 될지, 화살표(접속)가 될지 결정
                const rightSideContent = isAdmin 
                    ? `<button class="sub-btn" style="background:var(--danger); color:white; padding:8px 15px; font-size:13px;" onclick="event.stopPropagation(); deleteVersion('${v.id}')">삭제</button>`
                    : `<div style="color:var(--p-main); font-weight:900; font-size: 18px; padding-right: 10px;">➔</div>`;

                item.innerHTML = `
                    <div class="avatar-circle" style="width:50px; height:50px; margin:0 15px 0 0;">V</div>
                    <div style="flex:1; text-align:left; overflow: hidden;">
                        <div style="font-weight:800; font-size:16px; color:#333; margin-bottom: 2px;">${v.name}</div>
                        <div style="font-size:11px; color:#888; display:flex; gap: 8px;">
                            <span style="background:var(--p-light); color:var(--p-main); padding: 2px 6px; border-radius: 5px; font-weight:bold;">${dateStr}</span>
                            <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%;">${v.link}</span>
                        </div>
                    </div>
                    <div>
                        ${rightSideContent}
                    </div>
                `;
                list.appendChild(item);
            });
        }
    </script>
</body>
</html>
