<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>퍼플톡 6-7 버전 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f0f2f5;
        }
        .purple-gradient {
            background: linear-gradient(135deg, #6d28d9 0%, #4c1d95 100%);
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .admin-panel {
            display: none;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

<!-- 초기 접속 환경 선택 화면 -->
<div id="env-selector" class="fixed inset-0 z-[100] bg-white flex flex-center items-center justify-center p-6">
    <div class="text-center max-w-md w-full">
        <div class="w-20 h-20 bg-violet-600 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-lg">
            <span class="text-white text-4xl font-bold">P</span>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">접속 환경 선택</h1>
        <p class="text-gray-500 mb-8 text-sm">기기에 최적화된 화면을 제공합니다.</p>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="setEnvironment('pc')" class="p-6 border-2 border-gray-100 rounded-2xl hover:border-violet-500 hover:bg-violet-50 transition-all group">
                <div class="text-4xl mb-2 group-hover:scale-110 transition">💻</div>
                <div class="font-bold">PC</div>
            </button>
            <button onclick="setEnvironment('mobile')" class="p-6 border-2 border-gray-100 rounded-2xl hover:border-violet-500 hover:bg-violet-50 transition-all group">
                <div class="text-4xl mb-2 group-hover:scale-110 transition">📱</div>
                <div class="font-bold">모바일</div>
            </button>
        </div>
    </div>
</div>

<!-- 메인 앱 인터페이스 -->
<div id="main-app" class="hidden flex-1 flex flex-col">
    <!-- 상단 바 -->
    <header class="p-4 flex justify-between items-center bg-white border-b sticky top-0 z-10 shadow-sm">
        <div id="current-time" class="text-sm font-medium text-gray-600">시간 로딩 중...</div>
        <button onclick="openAdminAuth()" class="text-xs bg-violet-50 text-violet-600 border border-violet-200 px-3 py-1.5 rounded-full hover:bg-violet-100 transition">관리자 모드</button>
    </header>

    <div id="content-wrapper" class="flex-1 p-4 max-w-4xl mx-auto w-full">
        <div class="mb-8 mt-4 flex justify-between items-end">
            <div>
                <h2 class="text-3xl font-black text-violet-800 mb-1 italic tracking-tight">PURPLE TALK</h2>
                <p class="text-gray-500 text-sm">사용하실 버전을 선택하여 접속하세요.</p>
            </div>
            <div id="loading-indicator" class="text-sm text-violet-500 animate-pulse hidden">데이터 동기화 중...</div>
        </div>

        <!-- 버전 버튼 컨테이너 -->
        <div id="version-grid" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
            <div class="col-span-full py-20 text-center text-gray-400">데이터를 불러오는 중입니다...</div>
        </div>
    </div>

    <!-- 하단 관리자 추가 패널 -->
    <div id="admin-panel" class="admin-panel fixed bottom-0 left-0 right-0 glass-morphism border-t shadow-2xl p-6 z-40 rounded-t-3xl">
        <div class="max-w-xl mx-auto relative">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-lg text-violet-900 flex items-center gap-2">
                    <span class="bg-violet-100 p-1.5 rounded-lg">⚙️</span> 새 버전 링크 추가
                </h3>
                <button onclick="closeAdmin()" class="w-8 h-8 flex items-center justify-center bg-gray-100 text-gray-500 rounded-full hover:bg-gray-200 transition">×</button>
            </div>
            
            <div class="space-y-4 overflow-y-auto max-h-[70vh] pb-4">
                <input type="text" id="v-name" placeholder="버전명 (예: 퍼플톡 6.7.2)" class="w-full p-3.5 border border-gray-200 rounded-xl outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 bg-white">
                
                <div class="flex items-center gap-2 p-3 bg-violet-50 rounded-xl border border-violet-100">
                    <input type="checkbox" id="use-github" onchange="toggleGithubInputs()" class="w-4 h-4 accent-violet-600 rounded">
                    <label for="use-github" class="text-sm font-semibold text-violet-800 cursor-pointer select-none">GitHub Pages 자동 링크 생성</label>
                </div>

                <div id="github-inputs" class="hidden space-y-3 bg-white p-4 rounded-xl border border-gray-100">
                    <input type="text" id="gh-id" placeholder="GitHub ID" class="w-full p-3 border border-gray-200 rounded-lg outline-none focus:border-violet-500" oninput="updatePreviewLink()">
                    <input type="text" id="gh-repo" placeholder="Repository Name" class="w-full p-3 border border-gray-200 rounded-lg outline-none focus:border-violet-500" oninput="updatePreviewLink()">
                    <input type="text" id="gh-html" placeholder="HTML Name (예: index)" class="w-full p-3 border border-gray-200 rounded-lg outline-none focus:border-violet-500" oninput="updatePreviewLink()">
                    <div class="p-3 bg-gray-50 rounded-lg text-xs text-gray-600 break-all font-mono" id="link-preview">생성될 링크: </div>
                </div>

                <div id="manual-input">
                    <input type="text" id="v-link" placeholder="수동 접속 링크 입력 (https://...)" class="w-full p-3.5 border border-gray-200 rounded-xl outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 bg-white">
                </div>

                <button onclick="saveVersionToFirebase()" class="w-full purple-gradient text-white py-4 rounded-xl font-bold shadow-lg hover:shadow-violet-500/30 transition-shadow">
                    버전 리스트에 저장
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 비밀번호 모달 -->
<div id="pw-modal" class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm hidden z-[200] flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl text-center transform transition-all">
        <div class="w-16 h-16 bg-violet-100 rounded-2xl mx-auto mb-4 flex items-center justify-center text-3xl">🔐</div>
        <h2 class="text-xl font-bold mb-2 text-gray-800">관리자 인증</h2>
        <p class="text-sm text-gray-500 mb-6">시스템 관리를 위해 비밀번호를 입력하세요.</p>
        
        <input type="password" id="pw-input" class="w-full border-b-2 border-gray-200 text-3xl tracking-[1rem] text-center outline-none focus:border-violet-600 mb-8 pb-2 font-mono" maxlength="6">
        
        <div class="flex gap-3">
            <button onclick="hidePwModal()" class="flex-1 bg-gray-100 text-gray-600 py-3.5 rounded-xl font-bold hover:bg-gray-200 transition">취소</button>
            <button onclick="verifyPassword()" class="flex-1 purple-gradient text-white py-3.5 rounded-xl font-bold shadow-md">확인</button>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // ==========================================
    // Firebase 설정
    // ==========================================
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY", // Firebase 콘솔에서 확인 후 입력해주세요. (입력하지 않으면 오류가 발생할 수 있습니다)
        authDomain: "class-chat-6-7.firebaseapp.com",
        databaseURL: "https://class-chat-6-7-default-rtdb.asia-southeast1.firebasedatabase.app", // 요청하신 URL 적용 완료
        projectId: "class-chat-6-7",
        storageBucket: "class-chat-6-7.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Firebase 초기화
    let db;
    let useFirebase = false;

    try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        useFirebase = true;
        console.log("Firebase RTDB 초기화 완료");
    } catch(e) {
        console.error("Firebase 초기화 에러:", e);
    }

    // ==========================================
    // 앱 로직
    // ==========================================
    const ADMIN_PW = "384612";
    let versions = [];
    let currentEnv = 'pc';

    // 실시간 시간 업데이트
    function updateClock() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const ampm = now.getHours() >= 12 ? '오후' : '오전';
        let hours = now.getHours() % 12;
        hours = hours ? hours : 12;
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');

        const timeStr = `${year}년 ${month}월 ${day}일 ${ampm} ${hours}:${minutes}:${seconds}`;
        document.getElementById('current-time').textContent = timeStr;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 환경 설정 (PC/Mobile)
    function setEnvironment(env) {
        currentEnv = env;
        document.getElementById('env-selector').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        
        const wrapper = document.getElementById('content-wrapper');
        const grid = document.getElementById('version-grid');
        
        if (env === 'mobile') {
            wrapper.classList.remove('max-w-4xl');
            wrapper.classList.add('max-w-md');
            grid.classList.remove('sm:grid-cols-2', 'lg:grid-cols-3');
            grid.classList.add('grid-cols-1');
        }
        
        loadPreviousLocalData(); 
        fetchVersions();
    }

    // 관리자 모드
    function openAdminAuth() {
        document.getElementById('pw-modal').classList.remove('hidden');
        document.getElementById('pw-input').focus();
    }

    function hidePwModal() {
        document.getElementById('pw-modal').classList.add('hidden');
        document.getElementById('pw-input').value = '';
    }

    function verifyPassword() {
        const input = document.getElementById('pw-input').value;
        if (input === ADMIN_PW) {
            hidePwModal();
            document.getElementById('admin-panel').style.display = 'block';
        } else {
            alert("비밀번호가 올바르지 않습니다.");
        }
    }

    function closeAdmin() {
        document.getElementById('admin-panel').style.display = 'none';
    }

    // 깃허브 자동 링크 로직
    function toggleGithubInputs() {
        const isGithub = document.getElementById('use-github').checked;
        document.getElementById('github-inputs').classList.toggle('hidden', !isGithub);
        document.getElementById('manual-input').classList.toggle('hidden', isGithub);
    }

    function updatePreviewLink() {
        const id = document.getElementById('gh-id').value.trim();
        const repo = document.getElementById('gh-repo').value.trim();
        const html = document.getElementById('gh-html').value.trim();
        
        let link = "";
        if (id && repo && html) {
            link = `https://${id}.github.io/${repo}/${html}.html`;
            document.getElementById('link-preview').textContent = `생성될 링크: ${link}`;
        } else {
            document.getElementById('link-preview').textContent = `생성될 링크: 정보 입력 중...`;
        }
        return link;
    }

    // 데이터 불러오기 (Firebase)
    function fetchVersions() {
        const indicator = document.getElementById('loading-indicator');
        indicator.classList.remove('hidden');

        if(useFirebase) {
            db.ref('versions').on('value', (snapshot) => {
                indicator.classList.add('hidden');
                versions = [];
                const data = snapshot.val();
                
                if (data) {
                    Object.keys(data).forEach(key => {
                        versions.push({
                            id: key,
                            name: data[key].name,
                            link: data[key].link,
                            timestamp: data[key].timestamp
                        });
                    });
                    // 최신 버전이 위로 오도록 정렬
                    versions.sort((a, b) => b.timestamp - a.timestamp);
                }
                renderVersions();
            }, (error) => {
                console.error("Firebase 읽기 실패. 인증/규칙(Rules)을 확인하세요:", error);
                indicator.textContent = "데이터 불러오기 실패";
                fallbackToLocal();
            });
        } else {
            fallbackToLocal();
        }
    }

    function fallbackToLocal() {
        const indicator = document.getElementById('loading-indicator');
        indicator.classList.add('hidden');
        versions = JSON.parse(localStorage.getItem('pt_versions')) || [];
        renderVersions();
    }

    // 데이터 저장하기 (Firebase)
    function saveVersionToFirebase() {
        const name = document.getElementById('v-name').value.trim();
        const isGithub = document.getElementById('use-github').checked;
        let finalLink = "";

        if (isGithub) {
            finalLink = updatePreviewLink();
        } else {
            finalLink = document.getElementById('v-link').value.trim();
        }

        if (!name || !finalLink) {
            alert("버전명과 링크를 모두 입력해주세요.");
            return;
        }

        // 깃허브 아이디 로컬 보관
        if (isGithub) {
            localStorage.setItem('pt_last_gh_id', document.getElementById('gh-id').value.trim());
        }

        const versionData = {
            name: name,
            link: finalLink,
            timestamp: Date.now()
        };

        if(useFirebase) {
            db.ref('versions').push(versionData)
            .then(() => {
                closeAdmin();
                clearInputs();
            })
            .catch((error) => {
                console.error("Firebase 저장 에러:", error);
                alert("저장에 실패했습니다. Firebase 규칙(Rules)이 true 인지 확인하세요.");
            });
        } else {
            versionData.id = Date.now().toString();
            versions.unshift(versionData);
            localStorage.setItem('pt_versions', JSON.stringify(versions));
            renderVersions();
            closeAdmin();
            clearInputs();
        }
    }

    // 데이터 삭제하기
    function deleteVersion(id) {
        if (confirm("이 버전을 리스트에서 삭제할까요?")) {
            if(useFirebase) {
                db.ref('versions/' + id).remove()
                .catch((error) => {
                    console.error("Firebase 삭제 에러:", error);
                    alert("삭제에 실패했습니다.");
                });
            } else {
                versions = versions.filter(v => v.id !== id);
                localStorage.setItem('pt_versions', JSON.stringify(versions));
                renderVersions();
            }
        }
    }

    function clearInputs() {
        document.getElementById('v-name').value = '';
        document.getElementById('v-link').value = '';
        document.getElementById('gh-repo').value = '';
        document.getElementById('gh-html').value = '';
        document.getElementById('link-preview').textContent = '생성될 링크: ';
    }

    function loadPreviousLocalData() {
        const savedId = localStorage.getItem('pt_last_gh_id');
        if (savedId) {
            document.getElementById('gh-id').value = savedId;
        }
    }

    // 카드 렌더링
    function renderVersions() {
        const grid = document.getElementById('version-grid');
        grid.innerHTML = '';

        if (versions.length === 0) {
            grid.innerHTML = `
                <div class="col-span-full py-20 flex flex-col items-center justify-center text-gray-400">
                    <div class="text-4xl mb-4 opacity-50">📂</div>
                    <p>등록된 버전이 없습니다.</p>
                    <p class="text-xs mt-2">관리자 모드에서 새 버전을 추가해보세요.</p>
                </div>
            `;
            return;
        }

        versions.forEach(v => {
            const card = document.createElement('div');
            card.className = "group relative bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-lg hover:border-violet-200 transition-all cursor-pointer flex flex-col justify-between";
            card.onclick = () => window.open(v.link, '_blank');
            
            const date = new Date(v.timestamp);
            const dateStr = `${date.getMonth()+1}/${date.getDate()} 추가됨`;

            card.innerHTML = `
                <div class="mb-4">
                    <div class="flex items-center justify-between mb-3">
                        <span class="w-10 h-10 bg-violet-50 text-violet-600 rounded-xl flex items-center justify-center font-black text-lg">V</span>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] text-gray-400 font-medium">${dateStr}</span>
                            <button onclick="event.stopPropagation(); deleteVersion('${v.id}')" class="w-7 h-7 flex items-center justify-center bg-gray-50 text-gray-400 rounded-full hover:bg-red-50 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                    </div>
                    <h3 class="text-lg font-bold text-gray-800 break-words line-clamp-2">${v.name}</h3>
                    <p class="text-[11px] text-gray-400 truncate mt-1">${v.link}</p>
                </div>
                <div class="mt-2 text-violet-600 font-bold text-sm flex items-center gap-1 group-hover:gap-2 transition-all">
                    접속하기 
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    document.getElementById('pw-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') verifyPassword();
    });
</script>

</body>
</html>
